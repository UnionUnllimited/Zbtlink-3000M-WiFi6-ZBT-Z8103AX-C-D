name: Build Atlanta Router Firmware

on:
  push:
    branches: [main]
    paths:
      - 'files/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: 'OpenWrt version'
        default: '25.12.3'
        required: true
      clean_build:
        description: 'Без кэша'
        type: boolean
        default: false

env:
  OPENWRT_VERSION: ${{ github.event.inputs.openwrt_version || '25.12.3' }}
  TARGET: mediatek/filogic
  DEVICE: zbtlink_zbt-z8103ax-c

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            wget tar zstd build-essential rsync squashfs-tools

      - name: Cache Image Builder
        id: cache-ib
        uses: actions/cache@v4
        if: ${{ !github.event.inputs.clean_build }}
        with:
          path: imagebuilder.tar.zst
          key: ib-${{ env.OPENWRT_VERSION }}-mediatek-filogic

      - name: Download Image Builder
        if: steps.cache-ib.outputs.cache-hit != 'true'
        run: |
          IB="openwrt-imagebuilder-${{ env.OPENWRT_VERSION }}-mediatek-filogic.Linux-x86_64"
          wget -q --show-progress -c \
            "https://downloads.openwrt.org/releases/${{ env.OPENWRT_VERSION }}/targets/${{ env.TARGET }}/${IB}.tar.zst" \
            -O imagebuilder.tar.zst

      - name: Extract Image Builder
        run: |
          tar --zstd -xf imagebuilder.tar.zst
          echo "IB_DIR=$(ls -d openwrt-imagebuilder-*/ | head -1 | sed 's|/$||')" >> $GITHUB_ENV

      - name: Extract offline packages into files/
        run: |
          PKGDIR="files/usr/lib/offline_pkgs"

          for tgz in "$PKGDIR"/*.tar.gz; do
            [ -f "$tgz" ] || continue
            echo "Extracting $(basename $tgz)..."
            tar xzf "$tgz" -C files/
            echo "  exit: $?"
          done

          # APK = два склеенных gzip потока; извлекаем второй (данные)
          for apk_file in "$PKGDIR"/*.apk; do
            [ -f "$apk_file" ] || continue
            echo "Extracting APK: $(basename $apk_file)..."
            python3 - "$apk_file" "files" << 'PYEOF'
          import sys, subprocess

          apk_path = sys.argv[1]
          dest = sys.argv[2]

          with open(apk_path, 'rb') as f:
              data = f.read()

          # Ищем второй gzip заголовок (1f 8b) после первого
          # Первый поток - подпись/метаданные, второй - файлы пакета
          i = 2
          while i < len(data) - 1:
              if data[i] == 0x1f and data[i+1] == 0x8b:
                  break
              i += 1

          stream = data[i:] if i < len(data) - 1 else data

          result = subprocess.run(
              ['tar', 'xz', '-C', dest,
               '--exclude=.PKGINFO', '--exclude=.SIGN.*',
               '--exclude=.pre-install', '--exclude=.post-install'],
              input=stream, capture_output=True
          )
          if result.returncode == 0:
              print(f"  OK (offset {i})")
          else:
              # Fallback: пробуем как обычный tar.gz
              result2 = subprocess.run(
                  ['tar', 'xzf', apk_path, '-C', dest,
                   '--exclude=.PKGINFO', '--exclude=.SIGN.*'],
                  capture_output=True
              )
              print(f"  {'OK fallback' if result2.returncode == 0 else 'FAIL'}")
          PYEOF
          done

          rm -rf "$PKGDIR"

          echo ""
          echo "=== Проверка после извлечения ==="
          echo -n "chinadns-ng: "; ls files/usr/bin/chinadns-ng 2>/dev/null && echo "OK" || echo "НЕТ"
          echo -n "dns2socks:   "; ls files/usr/bin/dns2socks   2>/dev/null && echo "OK" || echo "НЕТ"
          echo -n "tcping:      "; ls files/usr/bin/tcping       2>/dev/null && echo "OK" || echo "НЕТ"
          echo -n "passwall:    "; ls files/usr/share/passwall/utils.sh 2>/dev/null && echo "OK" || echo "НЕТ"
          echo -n "init passwall:"; ls files/etc/init.d/passwall 2>/dev/null && echo "OK" || echo "НЕТ"
          echo -n "zapret bin:  "; find files/opt/zapret files/usr/sbin -name "nfqws" 2>/dev/null | head -1 | grep -q . && echo "OK" || echo "НЕТ"
          echo -n "luci-zapret: "; find files/usr/share/luci -name "*zapret*" 2>/dev/null | head -1 | grep -q . && echo "OK" || echo "НЕТ"
          echo ""
          echo "files/usr/bin/:"; ls files/usr/bin/ 2>/dev/null
          echo "files/usr/share/ (top):"; ls files/usr/share/ 2>/dev/null

      - name: Inject secrets
        env:
          PASSWALL_SUB_URL: ${{ secrets.PASSWALL_SUB_URL }}
        run: |
          if [ -n "$PASSWALL_SUB_URL" ] && [ -f files/etc/config/passwall ]; then
            sed -i "s|__PASSWALL_SUB_URL__|${PASSWALL_SUB_URL}|g" \
              files/etc/config/passwall
          fi

      - name: Build firmware
        run: |
          cd "$IB_DIR"

          # Проверяем что files/ видны из IB_DIR
          echo "=== Видимость ../files из IB_DIR ==="
          echo -n "chinadns-ng: "; ls ../files/usr/bin/chinadns-ng 2>/dev/null && echo "OK" || echo "НЕТ"
          echo -n "passwall:    "; ls ../files/usr/share/passwall/utils.sh 2>/dev/null && echo "OK" || echo "НЕТ"
          echo ""

          PACKAGES="\
          luci luci-ssl luci-compat luci-lib-nixio luci-lua-runtime \
          luci-app-firewall luci-app-package-manager luci-app-attendedsysupgrade \
          xray-core microsocks \
          -dnsmasq dnsmasq-full \
          curl gzip unzip ip-full \
          coreutils-base64 coreutils-nohup coreutils-sleep coreutils-sort coreutils-od \
          zram-swap kmod-zram kmod-lib-lzo kmod-crypto-acompress \
          kmod-nft-queue kmod-nfnetlink-queue kmod-nf-conntrack-netlink \
          kmod-nf-socket kmod-nft-socket kmod-nf-tproxy kmod-nft-tproxy \
          libnetfilter-queue1 libnetfilter-conntrack3 \
          ubi-utils libyaml lyaml libbpf1 libelf1 libgmp10 libcap libnettle8"

          make image \
            PROFILE="${{ env.DEVICE }}" \
            PACKAGES="${PACKAGES}" \
            FILES="../files" \
            EXTRA_IMAGE_NAME="atlanta" \
            2>&1 | tee ../build.log

      - name: Verify squashfs contents
        run: |
          echo "=== Проверка staging rootfs ==="
          ROOTFS="$IB_DIR/build_dir/target-aarch64_cortex-a53_musl/root-mediatek"
          echo -n "chinadns-ng: "; ls "$ROOTFS/usr/bin/chinadns-ng" 2>/dev/null && echo "OK" || echo "НЕТ"
          echo -n "passwall:    "; ls "$ROOTFS/usr/share/passwall/utils.sh" 2>/dev/null && echo "OK" || echo "НЕТ"
          echo -n "init passwall:"; ls "$ROOTFS/etc/init.d/passwall" 2>/dev/null && echo "OK" || echo "НЕТ"
          echo -n "zapret:      "; find "$ROOTFS/opt/zapret" "$ROOTFS/usr/sbin" -name "nfqws" 2>/dev/null | head -1 | grep -q . && echo "OK" || echo "НЕТ"
          echo ""
          echo "Squashfs файл:"
          find "$IB_DIR/build_dir" -name "*.squashfs" 2>/dev/null | head -3
          echo ""
          echo "Проверяем squashfs напрямую (unsquashfs):"
          SFS=$(find "$IB_DIR/build_dir" -name "root.squashfs" 2>/dev/null | head -1)
          if [ -n "$SFS" ]; then
            unsquashfs -l "$SFS" | grep -E "chinadns|passwall|zapret" | head -20
          fi

      - name: Collect output
        run: |
          mkdir -p output
          find "$IB_DIR/bin/targets" \( -name "*.bin" -o -name "*.itb" \) \
            -exec cp {} output/ \; 2>/dev/null || true
          ls -lh output/
          sha256sum output/*.bin output/*.itb 2>/dev/null \
            | tee output/sha256sums.txt || true

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: atlanta-${{ env.OPENWRT_VERSION }}-r${{ github.run_number }}
          path: output/
          retention-days: 30

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-r${{ github.run_number }}
          path: build.log
          retention-days: 7

      - name: Summary
        if: always()
        run: |
          echo "## Atlanta Router Build" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${{ env.OPENWRT_VERSION }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Device  | \`${{ env.DEVICE }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Run     | #${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Firmware" >> $GITHUB_STEP_SUMMARY
          ls -lh output/*.bin output/*.itb 2>/dev/null \
            | awk '{print "- `"$NF"` ("$5")"}' >> $GITHUB_STEP_SUMMARY \
            || echo "- нет .bin файлов" >> $GITHUB_STEP_SUMMARY
