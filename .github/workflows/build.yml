name: Build Atlanta Router Firmware

on:
  push:
    branches: [main]
    paths:
      - 'files/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: 'OpenWrt version'
        default: '25.12.3'
        required: true
      clean_build:
        description: 'Без кэша'
        type: boolean
        default: false

env:
  OPENWRT_VERSION: ${{ github.event.inputs.openwrt_version || '25.12.3' }}
  TARGET: mediatek/filogic
  DEVICE: zbtlink_zbt-z8103ax-c

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            wget tar zstd build-essential rsync squashfs-tools

      - name: Cache Image Builder
        id: cache-ib
        uses: actions/cache@v4
        if: ${{ !github.event.inputs.clean_build }}
        with:
          path: imagebuilder.tar.zst
          key: ib-${{ env.OPENWRT_VERSION }}-mediatek-filogic

      - name: Download Image Builder
        if: steps.cache-ib.outputs.cache-hit != 'true'
        run: |
          IB="openwrt-imagebuilder-${{ env.OPENWRT_VERSION }}-mediatek-filogic.Linux-x86_64"
          wget -q --show-progress -c \
            "https://downloads.openwrt.org/releases/${{ env.OPENWRT_VERSION }}/targets/${{ env.TARGET }}/${IB}.tar.zst" \
            -O imagebuilder.tar.zst

      - name: Extract Image Builder
        run: |
          tar --zstd -xf imagebuilder.tar.zst
          echo "IB_DIR=$(ls -d openwrt-imagebuilder-*/ | head -1 | sed 's|/$||')" >> $GITHUB_ENV

      - name: Extract offline packages into files/
        run: |
          PKGDIR="files/usr/lib/offline_pkgs"

          # tar.gz архивы (chinadns, passwall) — обычная распаковка
          for tgz in "$PKGDIR"/*.tar.gz; do
            [ -f "$tgz" ] || continue
            echo "Extracting $(basename $tgz)..."
            tar xzf "$tgz" -C files/ && echo "  OK" || echo "  FAIL"
          done

          # APK файлы — signed APK = два gzip потока
          # Используем Python gzip для точного определения границы
          for apk_file in "$PKGDIR"/*.apk; do
            [ -f "$apk_file" ] || continue
            echo "Extracting APK: $(basename $apk_file)..."
            python3 << PYEOF
          import gzip, io, tarfile, sys, os

          apk_path = "$apk_file"
          dest = "files"

          with open(apk_path, 'rb') as f:
              data = f.read()

          # Читаем первый gzip поток целиком — находим его конец
          buf = io.BytesIO(data)
          pos = 0
          try:
              with gzip.GzipFile(fileobj=buf) as gz:
                  gz.read()
              pos = buf.tell()
          except Exception as e:
              print(f"  first stream read error: {e}")
              pos = 0

          # Пробуем второй поток (данные пакета)
          stream_data = data[pos:] if pos > 0 and pos < len(data) else data

          try:
              stream = io.BytesIO(stream_data)
              with tarfile.open(fileobj=stream, mode='r:gz') as tf:
                  members = [m for m in tf.getmembers()
                             if m.name and not m.name.startswith('.')]
                  tf.extractall(dest, members=members)
              print(f"  OK: {len(members)} файлов (offset {pos})")
          except Exception as e:
              # Fallback: пробуем весь файл как один поток
              try:
                  with tarfile.open(apk_path, mode='r:gz') as tf:
                      members = [m for m in tf.getmembers()
                                 if m.name and not m.name.startswith('.')]
                      tf.extractall(dest, members=members)
                  print(f"  OK fallback: {len(members)} файлов")
              except Exception as e2:
                  print(f"  FAIL: {e2}")
          PYEOF
          done

          rm -rf "$PKGDIR"

          echo ""
          echo "=== Результат ==="
          echo -n "chinadns-ng:   "; ls files/usr/bin/chinadns-ng 2>/dev/null && echo "OK" || echo "НЕТ"
          echo -n "passwall init: "; ls files/etc/init.d/passwall  2>/dev/null && echo "OK" || echo "НЕТ"
          echo -n "passwall lua:  "; ls files/usr/share/passwall/utils.sh 2>/dev/null && echo "OK" || echo "НЕТ"
          echo -n "zapret nfqws:  "; find files/opt/zapret -name "nfqws" 2>/dev/null | head -1 | grep -q . && echo "OK" || echo "НЕТ"
          echo -n "luci-zapret:   "; find files/usr/share/luci -name "*zapret*" 2>/dev/null | head -1 | grep -q . && echo "OK" || echo "НЕТ"

      - name: Inject secrets
        env:
          PASSWALL_SUB_URL: ${{ secrets.PASSWALL_SUB_URL }}
        run: |
          if [ -n "$PASSWALL_SUB_URL" ] && [ -f files/etc/config/passwall ]; then
            sed -i "s|__PASSWALL_SUB_URL__|${PASSWALL_SUB_URL}|g" \
              files/etc/config/passwall
          fi

      - name: Build firmware
        run: |
          cd "$IB_DIR"

          PACKAGES="\
          luci luci-ssl luci-compat luci-lib-nixio luci-lua-runtime \
          luci-app-firewall luci-app-package-manager luci-app-attendedsysupgrade \
          xray-core microsocks \
          -dnsmasq dnsmasq-full \
          curl gzip unzip ip-full openssl-util \
          coreutils-base64 coreutils-nohup coreutils-sleep coreutils-sort coreutils-od \
          zram-swap kmod-zram kmod-lib-lzo kmod-crypto-acompress \
          kmod-nft-queue kmod-nfnetlink-queue kmod-nf-conntrack-netlink \
          kmod-nf-socket kmod-nft-socket kmod-nf-tproxy kmod-nft-tproxy \
          libnetfilter-queue1 libnetfilter-conntrack3 \
          ubi-utils libyaml lyaml libbpf1 libelf1 libgmp10 libcap libnettle8"

          make image \
            PROFILE="${{ env.DEVICE }}" \
            PACKAGES="${PACKAGES}" \
            FILES="../files" \
            EXTRA_IMAGE_NAME="atlanta" \
            2>&1 | tee ../build.log

      - name: Verify squashfs
        run: |
          SFS=$(find "$IB_DIR/build_dir" -name "root.squashfs" 2>/dev/null | head -1)
          [ -n "$SFS" ] && unsquashfs -l "$SFS" 2>/dev/null \
            | grep -E "chinadns|passwall|zapret|nixio" | head -20 || true

      - name: Collect output
        run: |
          mkdir -p output
          find "$IB_DIR/bin/targets" \( -name "*.bin" -o -name "*.itb" \) \
            -exec cp {} output/ \; 2>/dev/null || true
          ls -lh output/
          sha256sum output/*.bin output/*.itb 2>/dev/null \
            | tee output/sha256sums.txt || true

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: atlanta-${{ env.OPENWRT_VERSION }}-r${{ github.run_number }}
          path: output/
          retention-days: 30

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-r${{ github.run_number }}
          path: build.log
          retention-days: 7

      - name: Summary
        if: always()
        run: |
          echo "## Atlanta Router Build" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${{ env.OPENWRT_VERSION }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Device  | \`${{ env.DEVICE }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Run     | #${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Firmware" >> $GITHUB_STEP_SUMMARY
          ls -lh output/*.bin output/*.itb 2>/dev/null \
            | awk '{print "- `"$NF"` ("$5")"}' >> $GITHUB_STEP_SUMMARY \
            || echo "- нет .bin файлов" >> $GITHUB_STEP_SUMMARY
